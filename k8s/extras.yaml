apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongodb:27017/taskflow"
  jwt-secret: "super_secret_taskflow_key_12345"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskflow-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskflow-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
